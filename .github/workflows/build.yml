name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: sfos-rs
          - os: windows-latest
            bin: sfos-rs.exe
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test (release)
        run: cargo test --release --locked

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sfos-rs-${{ matrix.os }}
          path: target/release/${{ matrix.bin }}
          if-no-files-found: error
