name: trivy

# Filesystem scan: dependency vulns (Cargo.lock), secrets, and IaC/workflow
# misconfigurations. This repo ships binaries, not container images — there is
# no Dockerfile — so the scan targets the repository tree. The trivy binary is
# downloaded at a pinned version and checksum-verified (the repo's Actions
# policy allows GitHub-owned actions only, so aquasecurity/trivy-action is not
# usable here).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "33 18 * * 6" # weekly, Saturday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fs-scan:
    name: trivy fs (vulns, secrets, misconfig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install trivy (pinned, checksum-verified)
        run: |
          set -euo pipefail
          ver=0.71.0
          sha=30a3d22b23f88c233f1658f562fb477cae3b3e8b4761109d515b7698daf85814
          curl -fsSL -o trivy.tgz "https://github.com/aquasecurity/trivy/releases/download/v${ver}/trivy_${ver}_Linux-64bit.tar.gz"
          echo "${sha}  trivy.tgz" | sha256sum -c -
          tar -xzf trivy.tgz trivy

      - name: Scan repository filesystem
        run: |
          ./trivy fs \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy-results.sarif \
            .

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy-results.sarif
