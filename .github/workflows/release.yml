name: release

# Two channels, one pipeline:
#   • push a tag `v*`   → a versioned GitHub release (binaries + .deb + SBOM),
#                         a `:<version>` + `:latest` container image on GHCR.
#   • push to `main`    → a rolling `edge` pre-release (same assets, refreshed)
#                         and a `:edge` container image — so downloads are
#                         available straight from CI without cutting a tag.
# Every artifact is cosign-signed (keyless) and carries SLSA build provenance.

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  # Superseded main builds can be cancelled; never cancel a tag release.
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  # cosign v3.1.1, linux/amd64 — pinned + checksum-verified (Actions policy
  # permits GitHub-owned actions only, so tools are fetched as pinned binaries).
  COSIGN_VERSION: v3.1.1
  COSIGN_BIN: cosign-linux-amd64
  COSIGN_SHA: ae1ecd212663f3693ad9edf8b1a183900c9a52d3155ba6e354237f9a0f6463fc

jobs:
  # ── derive channel (release vs edge) from the ref ──────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.m.outputs.channel }}
      tag: ${{ steps.m.outputs.tag }}
      prerelease: ${{ steps.m.outputs.prerelease }}
      image: ${{ steps.m.outputs.image }}
    steps:
      - id: m
        shell: bash
        run: |
          set -euo pipefail
          # GHCR requires a lower-case repository path.
          image="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            channel=release; tag="${GITHUB_REF_NAME}"; prerelease=false
          else
            channel=edge; tag=edge; prerelease=true
          fi
          {
            echo "channel=${channel}"
            echo "tag=${tag}"
            echo "prerelease=${prerelease}"
            echo "image=${image}"
          } >> "$GITHUB_OUTPUT"

  # ── native binaries (linux + windows) ──────────────────────────────────────
  build:
    name: build (${{ matrix.os }})
    needs: meta
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # keyless cosign + provenance attestation
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: sfos-rs
            asset: sfos-rs-linux-x86_64
          - os: windows-latest
            bin: sfos-rs.exe
            asset: sfos-rs-windows-x86_64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build (release)
        run: cargo build --release --locked

      - name: Stage binary + checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          (cd dist && sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256")

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/${{ matrix.asset }}

      - name: Stage provenance bundle as a release asset
        shell: bash
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/${{ matrix.asset }}.intoto.jsonl"

      - name: Install cosign (pinned, checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          bin="${{ env.COSIGN_BIN }}"
          [ "${RUNNER_OS}" = "Windows" ] && bin="cosign-windows-amd64.exe"
          curl -fsSL -o "${bin}" \
            "https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}/${bin}"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            echo "9d2c026e667bfd979fa7ba1cab8c4b24d2e73f336ec2d57f7fc72c7e73e5b4b6  ${bin}" | sha256sum -c -
          else
            echo "${{ env.COSIGN_SHA }}  ${bin}" | sha256sum -c -
          fi
          chmod +x "${bin}"

      - name: Sign binary (Sigstore keyless)
        shell: bash
        run: |
          set -euo pipefail
          bin="./${{ env.COSIGN_BIN }}"
          [ "${RUNNER_OS}" = "Windows" ] && bin="./cosign-windows-amd64.exe"
          "${bin}" sign-blob --yes \
            --bundle "dist/${{ matrix.asset }}.cosign.bundle" \
            "dist/${{ matrix.asset }}"

      - name: Upload staged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  # ── Debian package from the static (musl) binary ───────────────────────────
  deb:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build static musl binary
        run: |
          set -euo pipefail
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools
          cargo build --release --locked --target x86_64-unknown-linux-musl -p sfos-cli

      - name: Package .deb
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          SFOS_BIN="target/x86_64-unknown-linux-musl/release/sfos-rs" OUT_DIR=dist \
            packaging/deb/build-deb.sh
          deb="$(ls dist/sfos-rs_*_amd64.deb)"
          (cd dist && sha256sum "$(basename "$deb")" > "$(basename "$deb").sha256")
          echo "deb=${deb}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pkg.outputs.deb }}

      - name: Stage provenance + sign
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.attest.outputs.bundle-path }}" "${{ steps.pkg.outputs.deb }}.intoto.jsonl"
          curl -fsSL -o "${{ env.COSIGN_BIN }}" \
            "https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}/${{ env.COSIGN_BIN }}"
          echo "${{ env.COSIGN_SHA }}  ${{ env.COSIGN_BIN }}" | sha256sum -c -
          chmod +x "${{ env.COSIGN_BIN }}"
          "./${{ env.COSIGN_BIN }}" sign-blob --yes \
            --bundle "${{ steps.pkg.outputs.deb }}.cosign.bundle" \
            "${{ steps.pkg.outputs.deb }}"

      - name: Upload staged .deb
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-deb
          path: dist/*
          if-no-files-found: error

  # ── container image → GHCR (signed + attested) ─────────────────────────────
  docker:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # keyless cosign + provenance attestation
      attestations: write
    env:
      IMAGE: ${{ needs.meta.outputs.image }}
      TAG: ${{ needs.meta.outputs.tag }}
      CHANNEL: ${{ needs.meta.outputs.channel }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build, push, and capture digest
        id: push
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "${IMAGE}:${TAG}" .
          docker push "${IMAGE}:${TAG}"
          if [ "${CHANNEL}" = "release" ]; then
            docker tag "${IMAGE}:${TAG}" "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${TAG}" | cut -d@ -f2)"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ needs.meta.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Sign image (Sigstore keyless)
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o "${{ env.COSIGN_BIN }}" \
            "https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}/${{ env.COSIGN_BIN }}"
          echo "${{ env.COSIGN_SHA }}  ${{ env.COSIGN_BIN }}" | sha256sum -c -
          chmod +x "${{ env.COSIGN_BIN }}"
          "./${{ env.COSIGN_BIN }}" sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"

  # ── SPDX SBOM ──────────────────────────────────────────────────────────────
  sbom:
    name: sbom (SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cargo-sbom (pinned)
        run: cargo install cargo-sbom --version 0.10.0 --locked

      - name: Generate SPDX SBOM
        run: |
          set -euo pipefail
          mkdir -p dist
          cargo sbom > "dist/sfos-rs-${GITHUB_REF_NAME}.spdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom
          path: dist/*.spdx.json
          if-no-files-found: error

  # ── publish the GitHub release (versioned, or rolling `edge`) ──────────────
  publish:
    name: publish release
    needs: [meta, build, deb, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create / update the GitHub release (and the edge tag)
    steps:
      - name: Download staged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create or refresh the release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ needs.meta.outputs.channel }}
          TAG: ${{ needs.meta.outputs.tag }}
          IMAGE: ${{ needs.meta.outputs.image }}
        run: |
          set -euo pipefail
          if [ "${CHANNEL}" = "edge" ]; then
            # Move the rolling `edge` tag to this commit and replace its assets.
            gh release delete "${TAG}" --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag || true
            gh release create "${TAG}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "edge (latest main)" \
              --prerelease \
              --target "${GITHUB_SHA}" \
              --notes "Rolling build from \`main\` @ \`${GITHUB_SHA}\` — moves on every push. Binaries and the \`.deb\` are cosign-signed and provenance-attested. Container: \`docker pull ${IMAGE}:edge\`. Not a stable release."
          else
            gh release create "${TAG}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --generate-notes
          fi
