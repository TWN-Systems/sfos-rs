name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # keyless cosign + provenance attestation
      attestations: write # build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: sfos-rs
            asset: sfos-rs-linux-x86_64
            cosign_bin: cosign-linux-amd64
            cosign_sha: ae1ecd212663f3693ad9edf8b1a183900c9a52d3155ba6e354237f9a0f6463fc
          - os: windows-latest
            bin: sfos-rs.exe
            asset: sfos-rs-windows-x86_64.exe
            cosign_bin: cosign-windows-amd64.exe
            cosign_sha: 9d2c026e667bfd979fa7ba1cab8c4b24d2e73f336ec2d57f7fc72c7e73e5b4b6
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build (release)
        run: cargo build --release --locked

      - name: Stage binary + checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          (cd dist && sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256")

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ matrix.asset }}

      - name: Stage provenance bundle as a release asset
        shell: bash
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/${{ matrix.asset }}.intoto.jsonl"

      # Pinned, checksum-verified binary instead of sigstore/cosign-installer:
      # the repo's Actions policy allows GitHub-owned actions only.
      - name: Install cosign v3.1.1 (pinned, checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o "${{ matrix.cosign_bin }}" \
            "https://github.com/sigstore/cosign/releases/download/v3.1.1/${{ matrix.cosign_bin }}"
          echo "${{ matrix.cosign_sha }}  ${{ matrix.cosign_bin }}" | sha256sum -c -
          chmod +x "${{ matrix.cosign_bin }}"

      - name: Sign binary (Sigstore keyless)
        shell: bash
        run: |
          set -euo pipefail
          "./${{ matrix.cosign_bin }}" sign-blob --yes \
            --bundle "dist/${{ matrix.asset }}.cosign.bundle" \
            "dist/${{ matrix.asset }}"

      - name: Upload staged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  sbom:
    name: sbom (SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install cargo-sbom (pinned)
        run: cargo install cargo-sbom --version 0.10.0 --locked

      - name: Generate SPDX SBOM
        run: |
          set -euo pipefail
          mkdir -p dist
          cargo sbom > "dist/sfos-rs-${GITHUB_REF_NAME}.spdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom
          path: dist/*.spdx.json
          if-no-files-found: error

  publish:
    name: publish release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
    steps:
      - name: Download staged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
