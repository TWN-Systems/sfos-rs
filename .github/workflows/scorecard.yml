name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "19 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: OpenSSF Scorecard
    # Scorecard targets public repositories; skip while private.
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write # publish results to the OpenSSF API
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          if-no-files-found: warn

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: scorecard.sarif
