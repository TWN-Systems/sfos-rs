name: DCO

# Enforce the Developer Certificate of Origin: every non-merge commit in a PR
# MUST carry a `Signed-off-by:` trailer (CONTRIBUTING.md#license--sign-off-dco).
# This is the automated gate behind the documented DCO policy (OSPS-LE-01.01).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Developer Certificate of Origin sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          # SHAs are hex from the event payload (not interpolable); iterate non-merge commits.
          for sha in $(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}"); do
            author="$(git show -s --format='%an <%ae>' "${sha}")"
            if ! git show -s --format=%B "${sha}" \
                 | grep -qiE '^Signed-off-by: .+ <.+@.+\..+>'; then
              echo "::error::commit ${sha} (${author}) has no Developer Certificate of Origin sign-off."
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            {
              echo "DCO check failed: one or more commits lack a 'Signed-off-by' trailer."
              echo "Add it by committing with 'git commit -s' (see CONTRIBUTING.md#license--sign-off-dco)."
            } >&2
            exit 1
          fi
          echo "All non-merge commits carry a DCO sign-off. ✔"
