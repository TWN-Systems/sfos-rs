name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 6 * * 1" # weekly, Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo-audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo-deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny check

  opengrep:
    name: opengrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning (when repo is public / GHAS)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install opengrep (pinned, checksum-verified)
        run: |
          set -euo pipefail
          ver=v1.22.0
          sha=45bcd58440e397ed52c50e953ccf5948909ea77087c9186fc7d277216f62e319
          curl -fsSL -o opengrep "https://github.com/opengrep/opengrep/releases/download/${ver}/opengrep_manylinux_x86"
          echo "${sha}  opengrep" | sha256sum -c -
          chmod +x opengrep

      - name: opengrep scan
        run: ./opengrep scan --config auto --sarif-output=opengrep.sarif .

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opengrep-sarif
          path: opengrep.sarif
          if-no-files-found: warn

      - name: Upload SARIF to code scanning
        if: always()
        continue-on-error: true # code scanning needs a public repo or GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: opengrep.sarif
